<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Labour | Hire Labour AI</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        .search-container { display: flex; gap: 15px; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .labour-card { 
            background: var(--card-bg); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            padding: 24px; 
            transition: 0.3s;
        }
        .labour-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .pfp { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 16px; }
        .v-badge { font-size: 0.7rem; display: inline-flex; align-items: center; gap: 4px; }
    </style>
</head>
<body>
    <div style="width: 100%; max-width: 1200px; padding: 40px;">
        <h1 style="text-align: center; margin-bottom: 40px;">Find Verified Professionals</h1>
        
        <div class="search-container glass-card" style="max-width: 100%; padding: 20px;">
            <input type="text" id="skillSearch" placeholder="Search skills (e.g. Plumbing)" onkeyup="filter()">
            <input type="text" id="locSearch" placeholder="Location" onkeyup="filter()">
        </div>

        <div id="labourGrid" class="grid">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <script>
        let allLabourers = [];

        async function loadLabourers() {
            const res = await fetch('/api/labour/all');
            allLabourers = await res.json();
            render(allLabourers);
        }

        function render(list) {
            const grid = document.getElementById('labourGrid');
            grid.innerHTML = list.map(l => `
                <div class="labour-card animate-fade">
                    <div style="display: flex; gap: 15px; align-items: flex-start;">
                        <img src="${l.selfie_image ? '/' + l.selfie_image : 'https://via.placeholder.com/80'}" class="pfp">
                        <div>
                            <div style="font-weight: 800; font-size: 1.2rem;">${l.full_name}</div>
                            <div style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 8px;">${l.location}</div>
                            <span class="badge badge-${l.status.toLowerCase()} v-badge">
                                ${l.status === 'Verified' ? '✓ Verified' : l.status}
                            </span>
                        </div>
                    </div>
                    <div style="margin-top: 16px;">
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px;">Skills</div>
                        <div style="font-weight: 500;">${l.skills}</div>
                    </div>
                    <div style="margin-top: 16px; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <span style="font-size: 0.8rem; color: var(--text-muted);">Trust Score</span>
                            <div style="font-weight: 800; color: var(--primary);">${l.trust_score}%</div>
                        </div>
                        <button class="btn-primary" style="width: auto; padding: 8px 16px; font-size: 0.8rem;" onclick="location.href='profile.html?id=${l.id}'">View Profile</button>
                    </div>
                </div>
            `).join('');
        }

        function filter() {
            const skill = document.getElementById('skillSearch').value.toLowerCase();
            const loc = document.getElementById('locSearch').value.toLowerCase();
            
            const filtered = allLabourers.filter(l => 
                l.skills.toLowerCase().includes(skill) && 
                l.location.toLowerCase().includes(loc)
            );
            render(filtered);
        }

        loadLabourers();
    </script>
</body>
</html>
